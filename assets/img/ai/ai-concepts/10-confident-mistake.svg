  <text x="120" y="175" font-size="22" font-family="Arial" fill="#7c1f2b">"The Apollo 18 mission landed in 1974..."</text>
  <text x="120" y="215" font-size="20" font-family="Arial" fill="#92505a">sounds polished</text>
  <text x="300" y="215" font-size="20" font-family="Arial" fill="#92505a">but lacks grounding</text>
  <circle cx="660" cy="200" r="32" fill="#ffb8c1"/>
  <text x="648" y="209" font-size="28" font-family="Arial" font-weight="700" fill="#7c1f2b">?</text>
