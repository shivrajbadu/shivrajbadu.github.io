<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <rect width="800" height="340" fill="#fff7f7"/>
  <text x="40" y="55" font-size="30" font-family="Arial" font-weight="700" fill="#7c1f2b">Hallucination</text>
  <text x="40" y="95" font-size="18" font-family="Arial" fill="#92505a">Fluent output can still be inaccurate or invented</text>
