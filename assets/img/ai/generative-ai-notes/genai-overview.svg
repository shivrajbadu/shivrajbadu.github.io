<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f6fbff"/>
  <text x="60" y="70" font-size="38" font-family="Arial" font-weight="700" fill="#143b57">Generative AI at a glance</text>
  <text x="60" y="110" font-size="21" font-family="Arial" fill="#41627a">learn patterns from data -> generate new content -> support real workflows</text>
  <rect x="80" y="180" width="240" height="140" rx="24" fill="#d9ecff" stroke="#8eb7d4" stroke-width="2"/>
  <rect x="480" y="180" width="240" height="140" rx="24" fill="#d7f0e6" stroke="#91b7a6" stroke-width="2"/>
  <rect x="880" y="180" width="240" height="140" rx="24" fill="#fff0c9" stroke="#d7b069" stroke-width="2"/>
  <text x="150" y="240" font-size="26" font-family="Arial" font-weight="700" fill="#143b57">training data</text>
  <text x="122" y="280" font-size="19" font-family="Arial" fill="#41627a">text, images, audio, code, video</text>
  <text x="558" y="240" font-size="26" font-family="Arial" font-weight="700" fill="#1c5a38">model</text>
  <text x="528" y="280" font-size="19" font-family="Arial" fill="#4a765c">learns structure and probabilities</text>
  <text x="960" y="240" font-size="26" font-family="Arial" font-weight="700" fill="#6c4b11">output</text>
  <text x="931" y="280" font-size="19" font-family="Arial" fill="#8b6738">drafts, images, answers, code</text>
  <path d="M320 250 L480 250" stroke="#6b8ea6" stroke-width="5" marker-end="url(#a)"/>
  <path d="M720 250 L880 250" stroke="#739e74" stroke-width="5" marker-end="url(#b)"/>
  <text x="395" y="225" font-size="18" font-family="Arial" fill="#41627a">learn</text>
  <text x="797" y="225" font-size="18" font-family="Arial" fill="#6f6633">generate</text>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b8ea6"/></marker>
    <marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#739e74"/></marker>
  </defs>
  <rect x="180" y="410" width="840" height="120" rx="24" fill="#eef6ec" stroke="#bfd3bc"/>
  <text x="280" y="460" font-size="24" font-family="Arial" font-weight="700" fill="#2c5234">best results come from the full system, not the model alone</text>
  <text x="235" y="500" font-size="20" font-family="Arial" fill="#4a765c">prompting + retrieval + evaluation + safety + workflow integration</text>
</svg>
