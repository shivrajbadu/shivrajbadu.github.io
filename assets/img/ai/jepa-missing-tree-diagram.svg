<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">JEPA predictive diagram</title>
  <desc id="desc">A simple original diagram showing context, encoders, predictor, and latent target in a JEPA-style system.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6ec"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e8f1ff"/>
      <stop offset="100%" stop-color="#d8e9ff"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eaf8e5"/>
      <stop offset="100%" stop-color="#d7efd0"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff4d8"/>
      <stop offset="100%" stop-color="#ffe7a7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#355070"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #17324d; }
      .label { font: 700 22px Arial, sans-serif; fill: #17324d; }
      .text { font: 400 20px Arial, sans-serif; fill: #294861; }
      .small { font: 400 18px Arial, sans-serif; fill: #355070; }
      .tiny { font: 400 16px Arial, sans-serif; fill: #355070; }
      .box { stroke: #7aa0c4; stroke-width: 2; rx: 22; }
      .arrow { stroke: #355070; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)" />
  <text x="70" y="70" class="title">JEPA: predict the missing meaning, not every surface detail</text>

  <rect x="70" y="130" width="280" height="180" class="box" fill="url(#box1)" />
  <text x="100" y="175" class="label">Observed Context</text>
  <text x="100" y="215" class="text">"The cat climbed up the ..."</text>
  <text x="100" y="250" class="small">Visible words, image patches, or frames</text>
  <text x="100" y="280" class="small">The model sees enough context to infer structure</text>

  <rect x="430" y="130" width="250" height="180" class="box" fill="url(#box2)" />
  <text x="470" y="175" class="label">Context Encoder</text>
  <text x="470" y="215" class="text">Maps context to</text>
  <text x="470" y="245" class="text">a latent embedding</text>
  <text x="470" y="280" class="small">Keeps semantics, drops noise</text>

  <rect x="760" y="130" width="210" height="180" class="box" fill="url(#box3)" />
  <text x="810" y="175" class="label">Predictor</text>
  <text x="795" y="215" class="text">Forecasts the latent</text>
  <text x="815" y="245" class="text">state of what is</text>
  <text x="830" y="275" class="text">missing or next</text>

  <rect x="880" y="390" width="240" height="160" class="box" fill="url(#box1)" />
  <text x="925" y="435" class="label">Target Encoder</text>
  <text x="930" y="470" class="text">Encodes the true</text>
  <text x="920" y="500" class="text">hidden or future part</text>

  <rect x="460" y="390" width="260" height="160" class="box" fill="url(#box2)" />
  <text x="490" y="435" class="label">Predicted Latent Target</text>
  <text x="505" y="470" class="text">A concept like:</text>
  <text x="520" y="502" class="text">climbable outdoor object</text>

  <rect x="70" y="390" width="280" height="160" class="box" fill="url(#box3)" />
  <text x="100" y="435" class="label">Interpretable Output</text>
  <text x="100" y="470" class="text">Nearest concept or token:</text>
  <text x="100" y="510" class="text">"tree"</text>

  <path d="M350 220 L430 220" class="arrow" />
  <path d="M680 220 L760 220" class="arrow" />
  <path d="M865 310 L980 390" class="arrow dash" />
  <path d="M760 310 L620 390" class="arrow" />
  <path d="M460 470 L350 470" class="arrow" />

  <text x="740" y="365" class="tiny">training compares predicted latent with true latent</text>
  <text x="72" y="600" class="tiny">Original diagram created for this article. Real JEPA systems use richer encoders and predictors, often for images or video.</text>
</svg>
